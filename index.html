<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elisa & Arden — Message Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <p class="eyebrow">Elisa & Arden · Bali 2027</p>
    <h1>Leave a Message</h1>
    <p class="subtitle">Share your wishes with the couple</p>
  </header>

  <main>
    <form id="message-form">
      <div class="field">
        <input id="name" type="text" placeholder="Your name" autocomplete="off" />
      </div>
      <div class="field">
        <textarea id="message" placeholder="Your message…" rows="3"></textarea>
      </div>
      <p id="form-error" class="error hidden"></p>
      <button id="submit-btn" type="button">Send Message</button>
    </form>

    <section id="messages-section">
      <p id="loading">Loading messages…</p>
      <div id="messages-list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
